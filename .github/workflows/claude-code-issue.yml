name: Claude Code - Issue to PR

on:
  issues:
    types: [opened, labeled]

jobs:
  claude-code:
    if: |
      github.event.action == 'opened' ||
      (github.event.action == 'labeled' && github.event.label.name == 'claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          use_claude_code_github_app: true
          direct_prompt: |
            以下のGitHub Issueに基づいて実装し、Draft PRを作成してください。

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            手順:
            1. まず docs/ ディレクトリ内のドキュメントをすべて読み、プロジェクトの設計・課題を理解する
            2. git log --oneline -20 で過去のコミットスタイルを確認する
            3. issueの内容を理解し、実装方針を決める
            4. ブランチを作成する: git checkout -b issue-${{ github.event.issue.number }}
            5. 必要な変更を実装する
            6. 変更をコミットする（過去のコミットメッセージのスタイルに合わせる）
            7. ブランチをプッシュする: git push -u origin issue-${{ github.event.issue.number }}
            8. Draft PRを作成する:
               gh pr create --draft --title "Issue #${{ github.event.issue.number }}: 簡潔なタイトル" --body "Closes #${{ github.event.issue.number }}\n\n## 変更内容\n- 変更点の説明" --base main

            重要:
            - 必ずDraft PRを作成して完了すること
            - docs/のドキュメントを必ず参照してから実装すること
            - 過去のコミット履歴を参考にコーディングスタイルを合わせること
            - 多言語対応が必要な変更の場合は locales/ も考慮すること
          allowed_tools: |
            Bash(git:*)
            Bash(gh pr create:*)
            Bash(npm:*)
            Bash(node:*)
            Read
            Write
            Edit
            Glob
            Grep
