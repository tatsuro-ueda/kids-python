<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pythonれんしゅうちょう</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="../assets/snake.png" alt="ヘビ" class="mascot" data-i18n-alt="app.mascotAlt">
      <h1 data-i18n="app.title">Pythonれんしゅうちょう</h1>
      <div id="lang-selector">
        <button id="lang-btn" aria-label="Language">🌐</button>
        <ul id="lang-list" hidden></ul>
      </div>
    </header>
    <div id="status" hidden></div>
    <div id="editor" dir="ltr"></div>
    <div class="toolbar">
      <button id="run-btn" disabled data-i18n="app.run">じっこう</button>
      <select id="samples">
        <option value="" data-i18n="app.samplesLabel">おてほん</option>
      </select>
      <button id="share-btn" data-i18n="app.share">きょうゆう</button>
    </div>
    <pre id="output" dir="ltr"></pre>
    <div id="bookmark-banner" hidden>
      <p data-i18n="app.bookmarkMsg">ブックマークしておくと、つぎもすぐひらけるよ！</p>
      <button id="bookmark-close" data-i18n="app.bookmarkClose">とじる</button>
    </div>
  </div>
  <script type="module" src="dist/bundle.js"></script>
  <div class="edit-with-shelley">
    <a href="https://online-python.shelley.exe.xyz/" target="_blank" rel="noopener" class="shelley-btn">✏️ Edit with Shelley</a>
  </div>
  <footer class="site-footer">
    <p><span data-i18n="app.footerOperator">運営:</span> <a href="https://feel-physics.jp" target="_blank" rel="noopener">Feel Physics</a></p>
    <p><a href="mailto:tatsuro.ueda@feel-physics.jp" data-i18n="app.footerContact">お問い合わせ</a> ｜ <a href="/privacy.html" data-i18n="app.footerPrivacy" data-i18n-href="app.privacyUrl">プライバシーポリシー</a> ｜ <a href="https://discord.gg/sZCdKvT5Df" target="_blank" rel="noopener" data-i18n="app.helpTranslate">翻訳を手伝う / Help translate</a></p>
    <p>&copy; 2026 Feel Physics</p>
  </footer>
</body>
</html>
