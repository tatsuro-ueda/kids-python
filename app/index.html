<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pythonれんしゅうちょう</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="../assets/snake.png" alt="ヘビ" class="mascot" data-i18n-alt="app.mascotAlt">
      <h1 data-i18n="app.title">Pythonれんしゅうちょう</h1>
      <div id="lang-selector">
        <button id="lang-btn" aria-label="Language">🌐</button>
        <ul id="lang-list" hidden></ul>
      </div>
    </header>
    <div id="status" hidden></div>
    <div id="editor" dir="ltr"></div>
    <div class="toolbar">
      <button id="run-btn" disabled data-i18n="app.run">じっこう</button>
      <select id="samples">
        <option value="" data-i18n="app.samplesLabel">おてほん</option>
      </select>
      <button id="share-btn" data-i18n="app.share">きょうゆう</button>
      <button id="help-btn" data-i18n="app.helpBtn">わからない！</button>
    </div>
    <div id="help-form" hidden>
      <textarea id="help-msg" rows="3" data-i18n-placeholder="app.helpPlaceholder" placeholder="どこがわからない？"></textarea>
      <div class="help-form-buttons">
        <button id="help-send" data-i18n="app.helpSend">おくる</button>
        <button id="help-cancel" data-i18n="app.helpCancel">やめる</button>
      </div>
    </div>
    <pre id="output" dir="ltr"></pre>
    <div id="bookmark-banner" hidden>
      <p data-i18n="app.bookmarkMsg">ブックマークしておくと、つぎもすぐひらけるよ！</p>
      <button id="bookmark-close" data-i18n="app.bookmarkClose">とじる</button>
    </div>
  </div>
  <script type="module" src="dist/bundle.js"></script>
  <div class="dev-buttons">
    <a href="https://online-python.shelley.exe.xyz/" target="_blank" rel="noopener" class="shelley-btn">✏️ Edit with Shelley</a>
    <button id="issue-btn" class="issue-btn"><svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-2px;margin-right:4px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>Send Issue</button>
  </div>
  <footer class="site-footer">
    <p><span data-i18n="app.footerOperator">運営:</span> <a href="https://feel-physics.jp" target="_blank" rel="noopener">Feel Physics</a></p>
    <p><a href="mailto:tatsuro.ueda@feel-physics.jp" data-i18n="app.footerContact">お問い合わせ</a> ｜ <a href="/privacy.html" data-i18n="app.footerPrivacy" data-i18n-href="app.privacyUrl">プライバシーポリシー</a> ｜ <a href="https://discord.gg/sZCdKvT5Df" target="_blank" rel="noopener" data-i18n="app.helpTranslate">翻訳を手伝う / Help translate</a></p>
    <p>&copy; 2026 Feel Physics</p>
  </footer>
</body>
</html>
